<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile-card</title>

    <style>
      body {
        background-color: #d69ee4;
        font-family: Arial, sans-serif;
      }

      .profile-card {
        background-color: rgb(228, 223, 223);
        width: 300px;
        margin: 50px auto;
        padding: 20px;
        border-radius: 12px;
      }

      .profile-card img {
        width: 100%;
        border-radius: 12px;
      }

      .profile-card h1 {
        color: #333333;
        font-size: 28px;
      }

      .profile-card p {
        color: #666666;
        font-size: 16px;
      }

      .profile-card button {
        background-color: #525050;
        color: white;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 16px;
      }
    </style>
  </head>

  <body>
    <div class="profile-card">
      <img
        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSfLQ2LbaLVd2Wol5u1aXCGyt89VBW5iY-BVQ&s"
        alt="Profile Photo"
      />

      <h1>Isabella Garcia</h1>

      <p>
        Software Engineering student learning Full Stack Web Development
      </p>

      <button>Contact Me</button>
    </div>
  </body>
</html>
